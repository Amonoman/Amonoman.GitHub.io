<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amonoman | Portfolio</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#000;
    --surface:#121212;
    --surface-container:#1d1b20;
    --primary:#d0bcff;
    --on-primary:#381e72;
    --secondary-container:#332d41;
    --on-secondary-container:#e8def8;
    --on-surface:#e6e1e5;
    --shadow:rgba(0,0,0,0.4);
}

.light {
    --bg:#fff;
    --surface:#f3edf7;
    --surface-container:#f7f2fa;
    --primary:#6750a4;
    --on-primary:#fff;
    --secondary-container:#e8def8;
    --on-secondary-container:#1d192b;
    --on-surface:#1d1b20;
    --shadow:rgba(0,0,0,0.15);
}

body{
    margin:0;
    padding:0;
    font-family:'Roboto',sans-serif;
    background:var(--bg);
    color:var(--on-surface);
    display:flex;
    justify-content:center;
    min-height:100vh;
    overflow-x:hidden;
    transition:background .35s ease, color .35s ease;
}

.wave {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    pointer-events:none;
    background: var(--primary);
    opacity: 0.5;
    transform: scale(0);
    animation: waveAnim 0.6s ease-out forwards;
    z-index: 2000;
}

@keyframes waveAnim {
    to {
        transform: scale(80);
        opacity: 0;
    }
}

.container{
    width:100%;
    max-width:820px;
    padding:64px 20px;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--secondary-container);
    color: var(--on-secondary-container);
    padding: 14px;
    border-radius: 14px;
    cursor: pointer;
    z-index: 1000;
    display: flex;
    align-items: center;
    font-family: "Material Symbols Rounded";
    transition: background .3s ease, transform .2s ease;
}
.menu-btn:hover { transform: scale(1.1); }

.menu-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    background: var(--surface-container);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 16px var(--shadow);
    display: none;
    z-index: 999;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity .25s ease, transform .25s ease;
}

.menu-panel.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.menu-panel button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    background: var(--secondary-container);
    color: var(--on-secondary-container);
    font-weight: 600;
    margin-bottom: 10px;
    display:flex;
    align-items:center;
    gap:10px;
    transition: background .3s ease, transform .2s ease;
}
.menu-panel button:hover { transform: scale(1.05); }

header{
    text-align:center;
    margin-bottom:64px;
}

h1{
    font-size:3rem;
    font-weight:900;
    margin:0;
    color:var(--primary);
    letter-spacing:-2px;
    text-transform:uppercase;
    transition: color .35s ease;
}

.card{
    background:var(--surface-container);
    border-radius:28px;
    padding:28px;
    margin-bottom:28px;
    box-shadow:0 4px 16px var(--shadow);
    transition: background .35s ease, transform .25s ease;
}
.card:hover { transform: translateY(-6px); }

h2{
    font-size:1.1rem;
    font-weight:700;
    margin:0 0 24px 0;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--primary);
    transition: color .35s ease;
}

.links-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
}

.m3-btn{
    display:flex;
    align-items:center;
    gap:12px;
    padding:18px 24px;
    background:var(--secondary-container);
    color:var(--on-secondary-container);
    text-decoration:none;
    border-radius:20px;
    font-weight:600;
    transition: background .3s ease, transform .2s ease;
}
.m3-btn span { font-family:"Material Symbols Rounded"; }
.m3-btn:hover { transform: scale(1.05); }

.widget-img{
    width:100%;
    background:#000;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 6px 20px var(--shadow);
    margin-top:20px;
}

footer{
    text-align:center;
    margin-top:80px;
    opacity:.5;
    font-size:.8rem;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="menu-btn" id="menuBtn">menu</div>

<div class="menu-panel" id="menuPanel">
    <button id="themeToggle"><span class="material-symbols-rounded">dark_mode</span>Dark / Light</button>
</div>

<div class="container">

<header>
    <h1>Amonoman</h1>
</header>

<div class="card">
    <h2>Connect</h2>
    <div class="links-grid">

        <a href="https://github.com/Amonoman" class="m3-btn" target="_blank">
            <span class="material-symbols-rounded">code</span> GitHub
        </a>

        <a href="mailto:m28162214@gmail.com" class="m3-btn">
            <span class="material-symbols-rounded">mail</span> E-Mail
        </a>

        <a href="https://youtube.com/@amonoman-jojo" class="m3-btn" target="_blank">
            <span class="material-symbols-rounded">play_circle</span> YouTube
        </a>

        <a href="http://t.me/AmonomanX" class="m3-btn" target="_blank">
            <span class="material-symbols-rounded">send</span> Telegram
        </a>

        <a href="https://discord.com/users/1061627516596535396" class="m3-btn" target="_blank">
            <span class="material-symbols-rounded">forum</span> Discord
        </a>

        <a href="https://steamcommunity.com/id/Amonoman/" class="m3-btn" target="_blank">
            <span class="material-symbols-rounded">sports_esports</span> Steam
        </a>

    </div>
</div>

<div class="card">
    <h2>GitHub Activity</h2>

    <img 
        src="https://ghstats.onuralpsezer.com?user=Amonoman&hide_border=false&background=000000&ring=0A5CFF&fire=FF7A32&currStreakNum=FF7A32&currStreakLabel=FFFFFF&sideNums=FFFFFF&sideLabels=FFFFFF&dates=FFFFFF"
        class="widget-img"
    />

</div>

<footer>
    AMONOMAN | 2026
</footer>

</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");
const themeToggle = document.getElementById("themeToggle");

menuBtn.onclick = () => {
    menuPanel.classList.toggle("show");
};

themeToggle.onclick = (e) => {
    const x = e.clientX;
    const y = e.clientY;

    const wave = document.createElement("div");
    wave.classList.add("wave");
    wave.style.left = x + "px";
    wave.style.top = y + "px";
    document.body.appendChild(wave);

    setTimeout(() => wave.remove(), 600);

    document.body.classList.toggle("light");

    const icon = themeToggle.querySelector("span");
    icon.textContent = document.body.classList.contains("light") ? "light_mode" : "dark_mode";
    icon.style.transform = "rotate(180deg)";
    setTimeout(() => icon.style.transform = "rotate(0deg)", 300);
};
</script>

</body>
</html>
