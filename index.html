<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amonoman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
<style>

:root {
  --bg:        #0f0d13;
  --surf-cont: #1e1b2a;
  --surf-var:  #2a2640;
  --primary:   #d0bcff;
  --sec-cont:  #332d41;
  --on-sec:    #e8def8;
  --on-surf:   #e6e1e5;
  --on-surf-v: #cac4d0;
  --outline:   rgba(202,196,208,0.12);
  --outline-v: rgba(202,196,208,0.06);
  --shadow:    rgba(0,0,0,0.55);
  --shadow-lg: rgba(0,0,0,0.7);
  --r-xl: 28px; --r-l: 20px; --r-m: 16px;
}

body.light {
  --bg:        #fffbfe;
  --surf-cont: #ece6f0;
  --surf-var:  #e7e0ec;
  --primary:   #6750a4;
  --sec-cont:  #e8def8;
  --on-sec:    #1d192b;
  --on-surf:   #1c1b1f;
  --on-surf-v: #49454f;
  --outline:   rgba(73,69,79,0.2);
  --outline-v: rgba(73,69,79,0.08);
  --shadow:    rgba(0,0,0,0.12);
  --shadow-lg: rgba(0,0,0,0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', system-ui, sans-serif;
  background: var(--bg);
  color: var(--on-surf);
  min-height: 100vh;
  overflow-x: hidden;
}

#bg-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  image-rendering: pixelated;
  z-index: -1;
}

.topbar {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 600;
}

.fab {
  width: 40px; height: 40px;
  border-radius: var(--r-m);
  background: var(--surf-cont);
  color: var(--on-surf-v);
  border: 1px solid var(--outline);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: 'Material Symbols Rounded';
  font-size: 20px;
  transition: background .2s, color .2s, transform .18s, border-color .2s;
  user-select: none;
}
.fab:hover {
  background: var(--surf-var);
  color: var(--primary);
  border-color: var(--primary);
  transform: translateY(-2px);
}

.page {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 100px 24px 80px;
}

header {
  margin-bottom: 52px;
  animation: enter .6s cubic-bezier(.05,.7,.1,1) both;
}

.headline {
  font-size: clamp(2.1rem, 7.5vw, 3.8rem);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--primary);
  text-transform: uppercase;
}

.divider {
  width: 48px; height: 2px;
  background: var(--primary);
  border-radius: 2px;
  opacity: 0.5;
  margin-top: 18px;
}

.section-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--on-surf-v);
  opacity: 0.55;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--outline);
}

.md3-card {
  background: var(--surf-cont);
  border-radius: var(--r-xl);
  padding: 20px;
  margin-bottom: 14px;
  border: 1px solid var(--outline-v);
  box-shadow: 0 1px 4px var(--shadow), 0 4px 16px var(--shadow);
  transition: transform .25s cubic-bezier(.05,.7,.1,1), box-shadow .25s, background .3s, border-color .3s;
  animation: enter .55s cubic-bezier(.05,.7,.1,1) both;
}
.md3-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 2px 8px var(--shadow), 0 12px 32px var(--shadow-lg);
  border-color: var(--outline);
}
.md3-card:nth-child(1) { animation-delay: .08s; }
.md3-card:nth-child(2) { animation-delay: .14s; }

@keyframes enter {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.connect-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.tonal-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 15px 16px;
  background: var(--sec-cont);
  color: var(--on-sec);
  border-radius: var(--r-l);
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  border: 1px solid transparent;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative; overflow: hidden;
}
.tonal-btn::before {
  content: ''; position: absolute; inset: 0;
  background: currentColor; opacity: 0;
  transition: opacity .15s; border-radius: inherit;
}
.tonal-btn:hover::before  { opacity: .08; }
.tonal-btn:active::before { opacity: .14; }
.tonal-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px var(--shadow);
  border-color: var(--outline);
}
.tonal-btn .icon {
  font-family: 'Material Symbols Rounded';
  font-size: 19px; flex-shrink: 0;
  position: relative; opacity: 0.85;
}
.tonal-btn .lbl { position: relative; }

.gh-wrap { border-radius: var(--r-m); overflow: hidden; }
.widget-img { width: 100%; display: block; }

footer {
  text-align: center;
  margin-top: 52px;
  padding-top: 24px;
  border-top: 1px solid var(--outline-v);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--on-surf-v);
  opacity: 0.35;
}

</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="topbar">
  <div class="fab" id="themeBtn">dark_mode</div>
</div>

<div class="page">

  <header>
    <div class="headline">Amonoman</div>
    <div class="divider"></div>
  </header>

  <div class="md3-card">
    <div class="section-label">Connect</div>
    <div class="connect-grid">
      <a href="https://github.com/Amonoman" class="tonal-btn" target="_blank">
        <span class="icon">code</span><span class="lbl">GitHub</span>
      </a>
      <a href="mailto:m28162214@gmail.com" class="tonal-btn">
        <span class="icon">mail</span><span class="lbl">E-Mail</span>
      </a>
      <a href="https://youtube.com/@amonoman-jojo" class="tonal-btn" target="_blank">
        <span class="icon">play_circle</span><span class="lbl">YouTube</span>
      </a>
      <a href="http://t.me/AmonomanX" class="tonal-btn" target="_blank">
        <span class="icon">send</span><span class="lbl">Telegram</span>
      </a>
      <a href="https://discord.com/users/1061627516596535396" class="tonal-btn" target="_blank">
        <span class="icon">forum</span><span class="lbl">Discord</span>
      </a>
      <a href="https://steamcommunity.com/id/Amonoman/" class="tonal-btn" target="_blank">
        <span class="icon">sports_esports</span><span class="lbl">Steam</span>
      </a>
    </div>
  </div>

  <div class="md3-card">
    <div class="section-label">GitHub Activity</div>
    <div class="gh-wrap">
      <img id="ghWidget"
        src="https://ghstats.onuralpsezer.com?user=Amonoman&hide_border=true&background=00000000&ring=d0bcff&fire=d0bcff&currStreakNum=e6e1e5&currStreakLabel=d0bcff&sideNums=e6e1e5&sideLabels=d0bcff&dates=cac4d0"
        class="widget-img" alt="GitHub Streak Stats" />
    </div>
  </div>

  <footer>Amonoman · 2026</footer>
</div>

<script>
const canvas   = document.getElementById('bg-canvas');
const ctx      = canvas.getContext('2d');
const themeBtn = document.getElementById('themeBtn');
const ghWidget = document.getElementById('ghWidget');

const PS       = 8;
const DURATION = 1100;

let W, H, cols, rows, isLight = false, rafId = null;

const COLORS = {
  dark:  [15,  13,  19 ],
  light: [255, 251, 254]
};

const WIDGET = {
  dark:  'https://ghstats.onuralpsezer.com?user=Amonoman&hide_border=true&background=00000000&ring=d0bcff&fire=d0bcff&currStreakNum=e6e1e5&currStreakLabel=d0bcff&sideNums=e6e1e5&sideLabels=d0bcff&dates=cac4d0',
  light: 'https://ghstats.onuralpsezer.com?user=Amonoman&hide_border=true&background=00000000&ring=6750a4&fire=6750a4&currStreakNum=1c1b1f&currStreakLabel=6750a4&sideNums=1c1b1f&sideLabels=6750a4&dates=49454f'
};

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  cols = Math.ceil(W / PS) + 1;
  rows = Math.ceil(H / PS) + 1;
  canvas.width  = W; canvas.height  = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
}

function startWave(ox, oy, toLight) {
  if (rafId) cancelAnimationFrame(rafId);

  const off = new Float32Array(cols * rows);
  for (let i = 0; i < off.length; i++) off[i] = (Math.random() - .5) * 6;

  const [nr, ng, nb] = COLORS[toLight ? 'light' : 'dark'];
  const color = `rgb(${nr},${ng},${nb})`;
  const gox = ox / PS, goy = oy / PS;
  const maxDist = Math.sqrt(Math.max(gox, cols-gox)**2 + Math.max(goy, rows-goy)**2) + 10;

  let t0 = null, flipped = false;

  function frame(ts) {
    if (!t0) t0 = ts;
    const t = Math.min((ts - t0) / DURATION, 1);
    const e = t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    const wf = e * maxDist;

    ctx.clearRect(0, 0, W, H);

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const dx = col - gox, dy = row - goy;
        if (Math.sqrt(dx*dx + dy*dy) + off[row*cols+col] <= wf) {
          ctx.fillStyle = color;
          ctx.fillRect(col*PS, row*PS, PS, PS);
        }
      }
    }

    if (!flipped && t >= 0.6) {
      flipped = true;
      document.body.classList.toggle('light', toLight);
      themeBtn.textContent = toLight ? 'light_mode' : 'dark_mode';
      ghWidget.src = WIDGET[toLight ? 'light' : 'dark'];
    }

    rafId = t < 1 ? requestAnimationFrame(frame) : (ctx.clearRect(0,0,W,H), null);
  }

  rafId = requestAnimationFrame(frame);
}

resize();
window.addEventListener('resize', resize);

themeBtn.addEventListener('click', () => {
  const r = themeBtn.getBoundingClientRect();
  isLight = !isLight;
  startWave(r.left + r.width/2, r.top + r.height/2, isLight);
});
</script>
</body>
</html>
